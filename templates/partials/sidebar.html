<div class="col-md-3 col-lg-2 px-0 sidebar">
    <div class="p-3">
        <div class="text-center mb-4">
            <i class="fas fa-graduation-cap fa-2x mb-2"></i>
            <h5>JDK Supervisor</h5>
            <small class="opacity-75">KPMIM Student Disciplinary System</small>
        </div>
        
        <nav class="nav flex-column">
            <a class="nav-link {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}" href="{% url 'admin_dashboard' %}">
                <i class="fas fa-tachometer-alt me-2"></i>Dashboard
            </a>
            
            <div class="nav-item">
                <a class="nav-link {% if 'student' in request.resolver_match.url_name %}active{% endif %}" href="#" data-bs-toggle="collapse" data-bs-target="#studentsCollapse" aria-expanded="{% if 'student' in request.resolver_match.url_name %}true{% else %}false{% endif %}">
                    <i class="fas fa-users me-2"></i>Students
                    <i class="fas fa-chevron-down ms-auto"></i>
                </a>
                <div class="collapse {% if 'student' in request.resolver_match.url_name %}show{% endif %}" id="studentsCollapse">
                    <div class="ms-3">
                        <a class="nav-link {% if request.resolver_match.url_name == 'add_student' %}active{% endif %}" href="{% url 'add_student' %}" style="padding: 8px 20px; font-size: 0.9rem;">
                            <i class="fas fa-user-plus me-2"></i>Add Student
                        </a>
                        <a class="nav-link {% if request.resolver_match.url_name == 'student_list' %}active{% endif %}" href="{% url 'student_list' %}" style="padding: 8px 20px; font-size: 0.9rem;">
                            <i class="fas fa-list me-2"></i>Student List
                        </a>
                    </div>
                </div>
            </div>
            
            <a class="nav-link {% if 'case' in request.resolver_match.url_name %}active{% endif %}" href="#disciplinary-cases">
                <i class="fas fa-folder-open me-2"></i>Disciplinary Cases
            </a>
            
            <a class="nav-link {% if 'report' in request.resolver_match.url_name %}active{% endif %}" href="#reports">
                <i class="fas fa-chart-bar me-2"></i>Reports
            </a>
            
            <hr class="my-3" style="border-color: rgba(255,255,255,0.2);">
            
            <a class="nav-link" href="{% url 'landing_page' %}">
                <i class="fas fa-sign-out-alt me-2"></i>Logout
            </a>
        </nav>
    </div>
</div>
